<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IERE — Trinidad & Tobago 3D Map</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a12;
    overflow: hidden;
    font-family: 'Segoe UI', Arial, sans-serif;
    color: #fff;
  }
  #canvas-container {
    width: 100vw;
    height: 100vh;
    position: relative;
  }
  /* Loading overlay */
  #loading {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: #0a0a12;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 1000;
    transition: opacity 0.8s;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
  #loading h1 {
    font-size: 3rem;
    letter-spacing: 0.5em;
    color: #d4a843;
    margin-bottom: 1.5rem;
    text-shadow: 0 0 30px rgba(212,168,67,0.4);
  }
  .spinner {
    width: 50px; height: 50px;
    border: 3px solid rgba(212,168,67,0.2);
    border-top-color: #d4a843;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Logo overlay */
  #logo-container {
    position: fixed;
    top: 20px; left: 20px;
    z-index: 100;
    pointer-events: none;
  }
  #logo-container img {
    width: 120px;
    height: auto;
    filter: drop-shadow(0 0 15px rgba(212,168,67,0.5));
  }
  #logo-fallback {
    display: none;
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: 0.3em;
    color: #d4a843;
    text-shadow: 0 0 20px rgba(212,168,67,0.5);
    padding: 10px 20px;
    border: 2px solid rgba(212,168,67,0.4);
    border-radius: 8px;
    background: rgba(10,10,18,0.8);
  }

  /* IERE title */
  #title {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    font-size: 3.5rem;
    font-weight: 900;
    letter-spacing: 0.6em;
    color: #d4a843;
    text-shadow: 0 0 40px rgba(212,168,67,0.5), 0 0 80px rgba(212,168,67,0.2);
    pointer-events: none;
    padding-left: 0.6em; /* visual balance for letter-spacing */
  }

  /* Info panel */
  #info-panel {
    position: fixed;
    top: 20px; right: 20px;
    z-index: 100;
    background: rgba(10,10,18,0.85);
    border: 1px solid rgba(212,168,67,0.3);
    border-radius: 12px;
    padding: 15px 20px;
    min-width: 200px;
    backdrop-filter: blur(10px);
  }
  #info-panel h3 {
    color: #d4a843;
    font-size: 0.85rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  #info-panel .city-info {
    font-size: 0.8rem;
    color: #ccc;
    line-height: 1.6;
  }
  #info-panel .city-info span {
    color: #d4a843;
  }

  /* Legend */
  #legend {
    position: fixed;
    bottom: 100px; right: 20px;
    z-index: 100;
    background: rgba(10,10,18,0.85);
    border: 1px solid rgba(212,168,67,0.2);
    border-radius: 10px;
    padding: 12px 18px;
    backdrop-filter: blur(10px);
  }
  #legend div {
    display: flex; align-items: center; gap: 10px;
    margin: 4px 0;
    font-size: 0.75rem;
    color: #aaa;
  }
  #legend .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  #legend .line {
    width: 20px; height: 3px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* Controls hint */
  #controls-hint {
    position: fixed;
    bottom: 30px; right: 20px;
    z-index: 100;
    font-size: 0.7rem;
    color: #555;
    text-align: right;
    line-height: 1.8;
  }
</style>

<div id="loading">
  <h1>IERE</h1>
  <div class="spinner"></div>
</div>

<div id="logo-container">
  <img id="logo-img" src="iere-logo.png" alt="IERE Logo" onerror="this.style.display='none'; document.getElementById('logo-fallback').style.display='block';">
  <div id="logo-fallback">IERE</div>
</div>

<div id="title">IERE</div>

<div id="legend">

<div id="controls-hint">

<div id="canvas-container"></div>

  controls.maxDistance = 120;

  // ─── PROJECTION ────────────────────────────────────────────────
  // Center on Trinidad & Tobago
  const CENTER_LAT = 10.8;
  const CENTER_LNG = -61.35;
  const SCALE = 120; // degrees to scene units

  function project(lng, lat) {
    const x = (lng - CENTER_LNG) * SCALE * Math.cos(CENTER_LAT * Math.PI / 180);
    const z = -(lat - CENTER_LAT) * SCALE;
    return [x, z];
  }

  function createExtrudedOutline(geojson, isTrinidad) {
    const group = new THREE.Group();
    const shape = new THREE.Shape();
    const coords = geojson;

    if (!coords || coords.length < 3) return group;

    const [sx, sy] = project(coords[0][0], coords[0][1]);
    shape.moveTo(sx, sy);

    for (let i = 1; i < coords.length; i++) {
      const [x, y] = project(coords[i][0], coords[i][1]);
      shape.lineTo(x, y);
    }
    shape.closePath();

    // Extrude settings for the 3D effect
    const extrudeSettings = {
      depth: isTrinidad ? 1.8 : 1.2,
      bevelEnabled: true,
      bevelThickness: 0.15,
      bevelSize: 0.08,
      bevelSegments: 3,
      curveSegments: 1
    };

    const geometry = new THREE.ExtrudeGeometry(shape, extrudeSettings);

    // Main land body - dark with slight metallic sheen
    const landMaterial = new THREE.MeshStandardMaterial({
      color: isTrinidad ? 0x1a2a1a : 0x1a2520,
      metalness: 0.3,
      roughness: 0.7,
      flatShading: false,
    });

    const landMesh = new THREE.Mesh(geometry, landMaterial);
    landMesh.rotation.x = -Math.PI / 2;
    landMesh.receiveShadow = true;
    landMesh.castShadow = true;
    group.add(landMesh);

    // Glowing outline on top
    const edgesGeo = new THREE.EdgesGeometry(geometry, 15);
    const edgeMat = new THREE.LineBasicMaterial({
      color: 0xd4a843,
      transparent: true,
      opacity: 0.7,
      linewidth: 1
    });
    const edges = new THREE.LineSegments(edgesGeo, edgeMat);
    edges.rotation.x = -Math.PI / 2;
    group.add(edges);

    // Top surface outline (perimeter glow strip)
    const topOutlinePoints = coords.map(c => {
      const [x, y] = project(c[0], c[1]);
      return new THREE.Vector3(x, isTrinidad ? 1.82 : 1.22, y);
    });
    const topOutlineGeo = new THREE.BufferGeometry().setFromPoints(topOutlinePoints);
    const topOutlineMat = new THREE.LineBasicMaterial({
      color: 0xd4a843,
      transparent: true,
      opacity: 0.9,
    });
    const topOutline = new THREE.LineLoop(topOutlineGeo, topOutlineMat);
    group.add(topOutline);

    // Bottom outline
    const botOutlinePoints = coords.map(c => {
      const [x, y] = project(c[0], c[1]);
      return new THREE.Vector3(x, 0.05, y);
    });
    const botOutlineGeo = new THREE.BufferGeometry().setFromPoints(botOutlinePoints);
    const botOutlineMat = new THREE.LineBasicMaterial({
      color: 0xd4a843,
      transparent: true,
      opacity: 0.4,
    });
    const botOutline = new THREE.LineLoop(botOutlineGeo, botOutlineMat);
    group.add(botOutline);

    return group;
  }

  function addRoads() {
    const roadGroup = new THREE.Group();

    HIGHWAYS.forEach(road => {
      const points = road.coords.map(c => {
        const [x, z] = project(c[0], c[1]);
        return new THREE.Vector3(x, 2.0, z);
      });

      if (points.length < 2) return;

      const curve = new THREE.CatmullRomCurve3(points, false);
      const tubeRadius = road.type === 'highway' ? 0.06 : 0.035;
      const tubeGeo = new THREE.TubeGeometry(curve, 64, tubeRadius, 6, false);
      const color = road.type === 'highway' ? 0xff8800 : 0xaa66ff;
      const tubeMat = new THREE.MeshStandardMaterial({
        color: color,
        emissive: color,
        emissiveIntensity: 0.5,
        metalness: 0.5,
        roughness: 0.3,
      });

      const tubeMesh = new THREE.Mesh(tubeGeo, tubeMat);
      tubeMesh.castShadow = true;
      roadGroup.add(tubeMesh);
    });

    scene.add(roadGroup);
  }

      let color, size, glowColor;
      switch (city.type) {
        case 'capital':

        case 'major':
          color = 0x44aaff; size = 0.25; glowColor = 0x2288ff; break;
        default:
          color = 0x88cc44; size = 0.18; glowColor = 0x66aa22; break;
      }

      // City pillar
      const pillarH = city.type === 'capital' ? 3.0 : city.type === 'major' ? 2.2 : 1.5;
      const pillarGeo = new THREE.CylinderGeometry(size * 0.4, size * 0.6, pillarH, 8);
      const pillarMat = new THREE.MeshStandardMaterial({
        color: color,
        emissive: color,
        emissiveIntensity: 0.3,
        metalness: 0.6,
        roughness: 0.3,
        transparent: true,
        opacity: 0.7,
      });
      const pillar = new THREE.Mesh(pillarGeo, pillarMat);
      pillar.position.set(x, 2 + pillarH / 2, z);
      pillar.castShadow = true;
      cityGroup.add(pillar);

      // City top marker (sphere)
      const markerGeo = new THREE.SphereGeometry(size, 16, 16);
      const markerMat = new THREE.MeshStandardMaterial({
        color: color,
        emissive: glowColor,
        emissiveIntensity: 0.6,
        metalness: 0.8,
        roughness: 0.2,
      });
      const marker = new THREE.Mesh(markerGeo, markerMat);
      marker.position.set(x, 2 + pillarH + size * 0.5, z);
      marker.castShadow = true;
      marker.userData = city;
      cityMeshes.push(marker);
      cityGroup.add(marker);

      // Glow ring
      const ringGeo = new THREE.RingGeometry(size * 1.5, size * 2.5, 32);
      const ringMat = new THREE.MeshBasicMaterial({
        color: color,
        transparent: true,
        opacity: 0.15,
        side: THREE.DoubleSide,
      });
      const ring = new THREE.Mesh(ringGeo, ringMat);
      ring.position.set(x, 2.05, z);
      ring.rotation.x = -Math.PI / 2;
      ring.userData = { isRing: true, baseOpacity: 0.15 };
      cityGroup.add(ring);

      // City label
      const labelCanvas = document.createElement('canvas');
      const ctx = labelCanvas.getContext('2d');
      labelCanvas.width = 256;
      labelCanvas.height = 64;
      ctx.fillStyle = 'transparent';
      ctx.fillRect(0, 0, 256, 64);
      ctx.font = city.type === 'capital' ? 'bold 28px Arial' : '22px Arial';
      ctx.fillStyle = '#ffffff';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowColor = color;
      ctx.shadowBlur = 8;
      ctx.fillText(city.name, 128, 32);

      const labelTexture = new THREE.CanvasTexture(labelCanvas);
      const labelMat = new THREE.SpriteMaterial({
        map: labelTexture,
        transparent: true,
        depthTest: false,
      });
      const label = new THREE.Sprite(labelMat);
      const labelScale = city.type === 'capital' ? 2.5 : city.type === 'major' ? 2.0 : 1.5;
      label.scale.set(labelScale, labelScale * 0.25, 1);
      label.position.set(x, 2 + pillarH + size + 0.8, z);
      cityGroup.add(label);
    });

    scene.add(cityGroup);
  }

  function addSeaGrid() {
    // Ocean grid
    const gridSize = 200;
    const gridDiv = 40;
    const gridHelper = new THREE.GridHelper(gridSize, gridDiv, 0x1a2a4a, 0x0d1520);
    gridHelper.position.y = -0.5;
    gridHelper.material.transparent = true;
    gridHelper.material.opacity = 0.4;
    scene.add(gridHelper);

    // Ocean plane
    const oceanGeo = new THREE.PlaneGeometry(200, 200);
    const oceanMat = new THREE.MeshStandardMaterial({
      color: 0x060d18,
      metalness: 0.9,
      roughness: 0.3,
      transparent: true,
      opacity: 0.8,
    });
    const ocean = new THREE.Mesh(oceanGeo, oceanMat);
    ocean.rotation.x = -Math.PI / 2;
    ocean.position.y = -0.6;
    ocean.receiveShadow = true;
    scene.add(ocean);
  }

  function addParticles() {
    const particleCount = 300;
    const positions = new Float32Array(particleCount * 3);
    for (let i = 0; i < particleCount; i++) {
      positions[i * 3]     = (Math.random() - 0.5) * 100;
      positions[i * 3 + 1] = Math.random() * 30 + 2;
      positions[i * 3 + 2] = (Math.random() - 0.5) * 100;
    }
    const particleGeo = new THREE.BufferGeometry();
    particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const particleMat = new THREE.PointsMaterial({
      color: 0xd4a843,
      size: 0.15,
      transparent: true,
      opacity: 0.4,
      blending: THREE.AdditiveBlending,
    });
    const particles = new THREE.Points(particleGeo, particleMat);
    particles.userData.isParticle = true;
    scene.add(particles);
    return particles;
  }

  // ─── LOAD GEOJSON DATA & BUILD SCENE ──────────────────────────
  async function init() {
    try {
      // Try multiple sources for boundary data
      let trinidadCoords = null;
      let tobagoCoords = null;

      // Method 1: Try fetching from world-atlas TopoJSON (Natural Earth data)
      try {
        const response = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
        const topology = await response.json();
        const countries = topojson.feature(topology, topology.objects.countries);

        // Find Trinidad and Tobago (id 780 or ISO "TTO")
        for (const feature of countries.features) {
          const props = feature.properties || {};
          const id = feature.id;
          if (id === '780' || id === 'TTO' || props.name === 'Trinidad and Tobago') {
            if (feature.geometry.type === 'MultiPolygon') {
              // Largest polygon is Trinidad, second is Tobago
              const polygons = feature.geometry.coordinates;
              if (polygons.length >= 2) {
                // Sort by area (number of points as proxy)
                const sorted = polygons.sort((a, b) => {
                  const aArea = a[0].length;
                  const bArea = b[0].length;
                  return bArea - aArea;
                });
                trinidadCoords = sorted[0][0]; // outer ring of largest
                tobagoCoords = sorted[1][0];   // outer ring of second largest
              } else if (polygons.length === 1) {
                trinidadCoords = polygons[0][0];
              }
            } else if (feature.geometry.type === 'Polygon') {
              trinidadCoords = feature.geometry.coordinates[0];
            }
            break;
          }
        }
      } catch (e) {
        console.warn('Could not load from world-atlas 110m, trying fallback...', e);
      }

      // Method 2: If 110m doesn't have enough detail, try 50m
      if (!trinidadCoords || (trinidadCoords && trinidadCoords.length < 20)) {
        try {
          const response = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json');
          const topology = await response.json();
          const countries = topojson.feature(topology, topology.objects.countries);

          for (const feature of countries.features) {
            const id = feature.id;
            if (id === '780' || id === 'TTO') {
              if (feature.geometry.type === 'MultiPolygon') {
                const polygons = feature.geometry.coordinates;
                const sorted = polygons.sort((a, b) => b[0].length - a[0].length);
                if (sorted.length >= 2) {
                  trinidadCoords = sorted[0][0];
                  tobagoCoords = sorted[1][0];
                } else if (sorted.length === 1) {
                  trinidadCoords = sorted[0][0];
                }
              } else if (feature.geometry.type === 'Polygon') {
                trinidadCoords = feature.geometry.coordinates[0];
              }
              break;
            }
          }
        } catch(e) {
          console.warn('Could not load from world-atlas 50m', e);
        }
      }

      // Method 3: Use embedded high-detail coordinates as fallback
      if (!trinidadCoords || trinidadCoords.length < 10) {
        console.log('Using embedded detailed coordinates');
        trinidadCoords = EMBEDDED_TRINIDAD;
        tobagoCoords = EMBEDDED_TOBAGO;
      }

      // Build the 3D map
      if (trinidadCoords) {
        const trinidad = createExtrudedOutline(trinidadCoords, true);
        scene.add(trinidad);
      }
      if (tobagoCoords) {
        const tobago = createExtrudedOutline(tobagoCoords, false);
        scene.add(tobago);
      }

      addSeaGrid();
      addRoads();
      addCities();
      const particles = addParticles();

      // Camera position
      camera.position.set(15, 35, 40);
      camera.lookAt(0, 0, -5);
      controls.target.set(0, 0, -5);
      controls.update();

      // Hide loading
      setTimeout(() => {
        document.getElementById('loading').classList.add('hidden');
      }, 500);

      // Animation loop
      const clock = new THREE.Clock();
      function animate() {
        requestAnimationFrame(animate);
        const time = clock.getElapsedTime();

        // Animate particles
        scene.traverse(obj => {
          if (obj.userData && obj.userData.isParticle) {
            obj.rotation.y = time * 0.02;
            obj.position.y = Math.sin(time * 0.3) * 0.5;
          }
          if (obj.userData && obj.userData.isRing) {
            obj.material.opacity = obj.userData.baseOpacity + Math.sin(time * 2) * 0.05;
            obj.scale.setScalar(1 + Math.sin(time * 1.5) * 0.1);
          }
        });

        // Pulse city markers
        cityMeshes.forEach((m, i) => {
          const s = 1 + Math.sin(time * 3 + i) * 0.08;
          m.scale.setScalar(s);
        });

        controls.update();
        renderer.render(scene, camera);
      }
      animate();

      // Mouse interaction for city hover
      renderer.domElement.addEventListener('mousemove', onMouseMove);

    } catch (err) {
      console.error('Initialization error:', err);
      // Still try to show something
      document.getElementById('loading').innerHTML = '<h1>IERE</h1><p style="color:#d4a843">Loading map data...</p>';
    }
  }

  function onMouseMove(event) {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(cityMeshes);

    const infoDiv = document.getElementById('hover-info');
    if (intersects.length > 0) {
      const city = intersects[0].object.userData;
      if (city && city.name) {
        infoDiv.innerHTML = `
          <span style="color:#d4a843;font-size:1rem">${city.name}</span><br>
          <span>Type:</span> ${city.type === 'capital' ? 'Capital' : city.type === 'major' ? 'Major City' : 'Town'}<br>
          <span>Region:</span> ${city.region || 'N/A'}<br>
          <span>Population:</span> ~${city.pop ? city.pop.toLocaleString() : 'N/A'}<br>
          <span>Coords:</span> ${city.lat.toFixed(4)}°N, ${Math.abs(city.lng).toFixed(4)}°W
        `;
      }
    } else {
      infoDiv.innerHTML = '<span>Hover</span> over cities for info<br><span>Drag</span> to rotate &bull; <span>Scroll</span> to zoom';
    }
  }
